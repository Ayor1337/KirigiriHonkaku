services:
  postgres:
    image: postgres:16
    container_name: kirigiri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kirigiri_honkaku
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kirigiri_honkaku"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

